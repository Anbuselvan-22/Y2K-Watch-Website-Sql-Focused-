{% extends "base.html" %}

{% block title %}Products - Luxury Watches{% endblock %}

{% block content %}
<section class="products-page py-4">
    <div class="container">
        <h1 class="display-4 fw-bold mb-4 text-center" style="font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">Our Collections</h1>
        <div class="row g-4">

            {% for product in products %}
            <div class="col-12 col-sm-6 col-md-6 col-lg-3">
                <div class="card h-100 product-card shadow-sm">
                    <div class="product-img-wrapper">
                        <img src="{{ product.image_url }}" alt="{{ product.name }}" class="card-img-top">
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" style="padding-left:10px; padding-top: 20px; font-size: 18px; font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">{{ product.name }}</h5>
                        <p class="card-text text-muted small" style="padding-left: 10px;font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">{{ product.description }}</p>
                        <p class="h5 fw-bold mt-auto" style="padding-left: 10px;font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;">${{ product.price }}</p>
                        <form action="{{ url_for('add_to_cart', product_id=product.id) }}" method="POST" class="mt-3">
                            <button type="submit" class="btn btn-gold w-100">
                                <i class="fas fa-shopping-cart"></i> Add to Cart
                            </button>
                        </form>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
