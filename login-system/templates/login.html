<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Secure Login System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-row">

            <!-- Left image area -->
            <div class="left-image"></div>

            <!-- Right transparent form -->
            <div class="right-panel">
                <div class="form-wrapper">

                    <h1><i class="fas fa-user-lock"></i> Welcome Back</h1>

                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            {% for message in messages %}
                                {% if 'logged out' in message or 'successful' in message %}
                                    <div class="alert alert-success">
                                        <i class="fas fa-check-circle"></i> {{ message }}
                                    </div>
                                {% else %}
                                    <div class="alert alert-danger shake">
                                        <i class="fas fa-exclamation-triangle"></i> {{ message }}
                                    </div>
                                {% endif %}
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="form-group">
                            <input type="text" name="username" class="form-control" placeholder="Username" required>
                        </div>

                        <div class="form-group">
                            <input type="password" name="password" class="form-control" placeholder="Password" required>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i> LOGIN
                        </button>
                    </form>

                    <div class="text-center">
                        <a class="small" href="{{ url_for('register') }}">
                            <i class="fas fa-user-plus"></i> Create an Account
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
