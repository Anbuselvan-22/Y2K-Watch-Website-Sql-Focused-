<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Secure Login System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/combined.css') }}">

</head>
<body class="bg-gradient-primary">
    <div class="container">
        <div class="dashboard-row justify-center">
            <div class="dashboard-main">
                <div class="dashboard-card o-hidden border-0 shadow-lg my-5">
                    <div class="dashboard-body p-5">
                        <div class="text-center">
                            <h1 class="h4 text-gray-900 mb-4"><i class="fas fa-tachometer-alt"></i> Welcome to your Dashboard!</h1>
                            <p class="mb-4">You are successfully logged in.</p>
                        </div>
                        <div class="dashboard-features">
                            <div class="feature-card mb-4">
                                <div class="dashboard-feature bg-primary text-white shadow">
                                    <div class="dashboard-feature-body">
                                        <i class="fas fa-user fa-2x"></i>
                                        <div class="text-white-50 small">Profile</div>
                                    </div>
                                </div>
                            </div>
                            <div class="feature-card mb-4">
                                <div class="dashboard-feature bg-success text-white shadow">
                                    <div class="dashboard-feature-body">
                                        <i class="fas fa-cog fa-2x"></i>
                                        <div class="text-white-50 small">Settings</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="text-center">
                            <a href="{{ url_for('logout') }}" class="btn btn-danger btn-user">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
